name: external-build-android-aarch64

on:
  workflow_dispatch:
    inputs:
      rust_version:
        description: Rust toolchain version. Leave empty to detect from source-repo/codex-rs/rust-toolchain.toml
        required: false
        default: ""
        type: string
      source_repository:
        description: Source repository to build
        required: true
        type: string
        default: openai/codex
      source_ref:
        description: Source ref to build
        required: true
        type: string

permissions:
  contents: read

jobs:
  record-run-id:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ github.token }}
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Record expected build run ID on candidate branch
        env:
          SOURCE_REF: ${{ inputs.source_ref }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -eu
          ver="${SOURCE_REF#rust-v}"
          echo "$ver" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$' || {
            echo "source_ref ($SOURCE_REF) is not a rust-vX.Y.Z tag; skipping run ID recording"
            exit 0
          }
          branch="automation/codex-${ver}"
          if ! git fetch origin "$branch:refs/remotes/origin/$branch" 2>/dev/null; then
            echo "Candidate branch $branch not found; skipping run ID recording (likely a manual/test build)"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$branch" "origin/$branch"
          node -e "
            const fs = require('fs');
            const p = 'config/codex-termux-release-manifest.json';
            const m = JSON.parse(fs.readFileSync(p, 'utf8'));
            m.expected_build_run_id = String(process.env.RUN_ID);
            fs.writeFileSync(p, JSON.stringify(m, null, 2) + '\n');
          "
          git add config/codex-termux-release-manifest.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: record expected build run ID ${RUN_ID} for ${ver}"
          git push origin "HEAD:$branch"
          echo "Recorded expected_build_run_id=${RUN_ID} on $branch"

  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    env:
      RUST_VERSION: ${{ inputs.rust_version }}
      ANDROID_NDK_REVISION: "r27c"
      ANDROID_TARGET: aarch64-linux-android
      ANDROID_API_LEVEL: "29"
      BUNDLE_DIR: ${{ github.workspace }}/external-build-bundle
    steps:
      - name: Validate source_ref
        run: |
          set -eu
          case "${{ inputs.source_repository }}" in
            DioNanos/codex-termux)
              case "${{ inputs.source_ref }}" in
                main|dev|staging|feature/*|v*|rust-v*)
                  ;;
                *)
                  echo "unsupported source_ref for fork line: ${{ inputs.source_ref }}" >&2
                  exit 1
                  ;;
              esac
              ;;
            openai/codex)
              case "${{ inputs.source_ref }}" in
                rust-v0.131.0|rust-v0.133.0|rust-v0.13[4-9].*|rust-v0.1[4-9][0-9]*)
                  ;;
                *)
                  echo "unsupported source_ref for upstream line: ${{ inputs.source_ref }}" >&2
                  exit 1
                  ;;
              esac
              ;;
            *)
              echo "unsupported source_repository: ${{ inputs.source_repository }}" >&2
              exit 1
              ;;
          esac

      - name: Checkout source ref
        uses: actions/checkout@v7
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 1
          path: host-repo

      - name: Checkout build source repo
        uses: actions/checkout@v7
        with:
          repository: ${{ inputs.source_repository }}
          ref: ${{ inputs.source_ref }}
          fetch-depth: 1
          path: source-repo

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Verify Python tomllib support
        run: |
          set -eu
          python3 --version
          python3 -c "import tomllib"

      - name: Detect Rust version from source-repo/codex-rs/rust-toolchain.toml
        if: env.RUST_VERSION == ''
        run: |
          set -eu
          rust_version="$(python3 -c 'import pathlib, tomllib; print(tomllib.loads(pathlib.Path("source-repo/codex-rs/rust-toolchain.toml").read_text(encoding="utf-8"))["toolchain"]["channel"])')"
          test -n "$rust_version"
          echo "RUST_VERSION=$rust_version" >> "$GITHUB_ENV"
          echo "Detected RUST_VERSION=$rust_version from source-repo/codex-rs/rust-toolchain.toml"

      - name: Verify upstream workspace version when needed
        if: inputs.source_repository == 'openai/codex'
        env:
          SOURCE_REF_INPUT: ${{ inputs.source_ref }}
        run: |
          set -eu
          python3 - <<'PY'
          import pathlib, tomllib, re, os

          path = pathlib.Path("source-repo/codex-rs/Cargo.toml")
          data = tomllib.loads(path.read_text(encoding="utf-8"))
          version = data["workspace"]["package"]["version"]
          expected_ref = os.environ.get("SOURCE_REF_INPUT", "")
          m = re.match(r"rust-v(.+)", expected_ref)
          if m and version != m.group(1):
              raise SystemExit(f"unexpected workspace.package.version: {version} (expected {m.group(1)})")
          print(f"workspace.package.version={version}")
          PY

      - name: Add swap space
        run: |
          set -eu
          df -h /home/runner /tmp
          free -h
          SWAP_FILE="$RUNNER_TEMP/swapfile"
          sudo fallocate -l 4G "$SWAP_FILE"
          sudo chmod 600 "$SWAP_FILE"
          sudo mkswap "$SWAP_FILE"
          sudo swapon "$SWAP_FILE"
          sudo sysctl vm.swappiness=10
          free -h
          df -h /home/runner /tmp

      - name: Install Rust
        run: |
          set -eu
          rustup toolchain install "${RUST_VERSION}" --profile minimal
          rustup target add "${ANDROID_TARGET}" --toolchain "${RUST_VERSION}"
          rustup default "${RUST_VERSION}"

      - name: Download Android NDK r27c
        run: |
          set -eu
          ndk_zip="$RUNNER_TEMP/android-ndk-${ANDROID_NDK_REVISION}.zip"
          ndk_dir="$RUNNER_TEMP/android-ndk-${ANDROID_NDK_REVISION}"
          ndk_url="https://dl.google.com/android/repository/android-ndk-${ANDROID_NDK_REVISION}-linux.zip"

          curl -fsSL "$ndk_url" -o "$ndk_zip"
          unzip -q "$ndk_zip" -d "$RUNNER_TEMP"

          test -d "$ndk_dir"
          {
            echo "ANDROID_NDK_ARCHIVE_URL=$ndk_url"
            echo "ANDROID_NDK_ARCHIVE_SIZE=$(wc -c < "$ndk_zip")"
            echo "ANDROID_NDK_ARCHIVE_SHA256=$(sha256sum "$ndk_zip" | awk '{print $1}')"
            echo "ANDROID_NDK_HOME=$ndk_dir"
            echo "ANDROID_NDK_ROOT=$ndk_dir"
            echo "CC_aarch64_linux_android=$ndk_dir/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android${ANDROID_API_LEVEL}-clang"
            echo "CXX_aarch64_linux_android=$ndk_dir/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android${ANDROID_API_LEVEL}-clang++"
            echo "AR_aarch64_linux_android=$ndk_dir/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"
            echo "RANLIB_aarch64_linux_android=$ndk_dir/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ranlib"
            echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$ndk_dir/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android${ANDROID_API_LEVEL}-clang"
          } >> "$GITHUB_ENV"
          rm -f "$ndk_zip"
          df -h /home/runner /tmp

      - name: Configure V8 Android artifact provenance
        run: |
          set -eu
          _fetch_rusty_v8() {
            local helper="$1"
            local source_root_arg="$2"
            local fetch_env="$RUNNER_TEMP/rusty-v8.env"
            python3 "$helper" ${source_root_arg:+--source-root "$source_root_arg"} > "$fetch_env"

            RUSTY_V8_ARCHIVE=""
            RUSTY_V8_SRC_BINDING_PATH=""
            while IFS='=' read -r key value; do
              case "$key" in
                export\ RUSTY_V8_ARCHIVE)
                  RUSTY_V8_ARCHIVE=$value
                  ;;
                export\ RUSTY_V8_SRC_BINDING_PATH)
                  RUSTY_V8_SRC_BINDING_PATH=$value
                  ;;
              esac
            done < "$fetch_env"

            test -n "$RUSTY_V8_ARCHIVE"
            test -n "$RUSTY_V8_SRC_BINDING_PATH"
            RUSTY_V8_ARCHIVE=${RUSTY_V8_ARCHIVE#\"}
            RUSTY_V8_ARCHIVE=${RUSTY_V8_ARCHIVE%\"}
            RUSTY_V8_SRC_BINDING_PATH=${RUSTY_V8_SRC_BINDING_PATH#\"}
            RUSTY_V8_SRC_BINDING_PATH=${RUSTY_V8_SRC_BINDING_PATH%\"}
            {
              echo "RUSTY_V8_ARCHIVE=$RUSTY_V8_ARCHIVE"
              echo "RUSTY_V8_SRC_BINDING_PATH=$RUSTY_V8_SRC_BINDING_PATH"
              echo "RUSTY_V8_RELEASE_TAG=$(basename "$(dirname "$RUSTY_V8_ARCHIVE")")"
            } >> "$GITHUB_ENV"
          }

          if [ -f source-repo/scripts/fetch_rusty_v8_android.py ]; then
            # DioNanos fork: use in-source helper (reads fork's own manifest)
            _fetch_rusty_v8 "source-repo/scripts/fetch_rusty_v8_android.py" ""
            echo "V8_ARTIFACT_MODE=helper-present" >> "$GITHUB_ENV"
            echo "V8_ARTIFACT_SOURCE=source-repo/scripts/fetch_rusty_v8_android.py" >> "$GITHUB_ENV"
          else
            if [ "${{ inputs.source_repository }}" = "DioNanos/codex-termux" ]; then
              echo "fork helper missing unexpectedly" >&2
              exit 1
            fi
            # openai/codex: use host-repo helper (reads private repo manifest)
            _fetch_rusty_v8 "host-repo/scripts/fetch_rusty_v8_android.py" "source-repo"
            echo "V8_ARTIFACT_MODE=host-helper" >> "$GITHUB_ENV"
            echo "V8_ARTIFACT_SOURCE=host-repo/scripts/fetch_rusty_v8_android.py" >> "$GITHUB_ENV"
          fi

      - name: Apply Android build patches (upstream openai/codex only)
        if: inputs.source_repository == 'openai/codex'
        run: |
          set -eu
          # Fix: tui/Cargo.toml includes cpal under cfg(not(target_os = "linux")),
          # but Android target_os = "android", so oboe-sys gets pulled in and
          # requires -lc++_static which is unavailable without the NDK on-device.
          # Upstream bug: https://github.com/openai/codex/issues/24507
          # Remove this patch once upstream fixes the cfg condition.
          tui_cargo="source-repo/codex-rs/tui/Cargo.toml"
          if grep -qF 'cfg(not(target_os = "linux"))' "$tui_cargo"; then
            sed -i 's/cfg(not(target_os = "linux"))/cfg(not(any(target_os = "linux", target_os = "android")))/g' "$tui_cargo"
            echo "Applied Android cpal/oboe-sys exclusion patch to tui/Cargo.toml"
          else
            echo "Patch not needed or already applied — skipping"
          fi

          # Patch: extend voice/audio_device cfg to exclude Android (tui/src/lib.rs)
          # Note: upstream removed audio_device/voice modules entirely in 0.140.0+ (cpal/oboe deps also gone)
          lib_rs="source-repo/codex-rs/tui/src/lib.rs"
          not_linux_count=$(grep -cF '#[cfg(not(target_os = "linux"))]' "$lib_rs"  || true)
          linux_count=$(grep -cF '#[cfg(target_os = "linux")]' "$lib_rs"  || true)
          if [ "$not_linux_count" -gt 0 ] || [ "$linux_count" -gt 0 ]; then
            test "$not_linux_count" -eq 2
            test "$linux_count" -eq 2
            sed -i 's/cfg(not(target_os = "linux"))/cfg(not(any(target_os = "linux", target_os = "android")))/g' "$lib_rs"
            sed -i 's/cfg(target_os = "linux")/cfg(any(target_os = "linux", target_os = "android"))/g' "$lib_rs"
            echo "Applied Android audio/voice cfg patch to tui/src/lib.rs"
          else
            echo "Patch not needed — upstream already removed audio_device/voice modules (0.140.0+)"
          fi

          # Patch: add vendored OpenSSL for Android target
          python3 - <<'INNERPY'
          from pathlib import Path

          path = Path('source-repo/codex-rs/core/Cargo.toml')
          text = path.read_text(encoding='utf-8')

          android_header = '[target.aarch64-linux-android.dependencies]'
          android_block = android_header + '\nopenssl-sys = { workspace = true, features = ["vendored"] }\n'
          musl_block = '[target.aarch64-unknown-linux-musl.dependencies]\nopenssl-sys = { workspace = true, features = ["vendored"] }\n'
          openssl_entry = 'openssl-sys = { workspace = true, features = ["vendored"] }'

          if android_block in text:
              print('Android vendored OpenSSL already present - skip')
          elif android_header in text:
              idx = text.index(android_header)
              section = text[idx:]
              next_sec = section.find('\n[', 1)
              section_content = section[:next_sec] if next_sec != -1 else section
              if openssl_entry in section_content:
                  print('openssl-sys vendored already in Android section (different format) - skip')
              else:
                  raise SystemExit('ERROR: Android target section exists without openssl-sys vendored - manual review required')
          elif musl_block in text:
              text = text.replace(musl_block, musl_block + '\n' + android_block, 1)
              path.write_text(text, encoding='utf-8')
              print('patched core/Cargo.toml with Android vendored OpenSSL block')
          else:
              raise SystemExit('ERROR: musl openssl-sys block not found in core/Cargo.toml')
          INNERPY

          # Patch: fix startup lock for Android (acquire_app_server_startup_lock)
          # unix_socket.rs calls file.lock() without Android cfg guard, causing
          # "lock() not supported" on Android /data partition (flock ENOTSUP).
          # Same fix already applied upstream in installation_id.rs and arg0/lib.rs.
          # Remove this patch once upstream openai/codex fixes unix_socket.rs.
          unix_socket_rs="source-repo/codex-rs/app-server-transport/src/transport/unix_socket.rs"
          set +e
          python3 - "$unix_socket_rs" <<'LOCKPYEOF'
          import sys, pathlib
          p = pathlib.Path(sys.argv[1])
          txt = p.read_text()
          old = '        file.lock()?;'
          new = '        #[cfg(not(target_os = "android"))]\n        file.lock()?;'
          if old in txt:
              p.write_text(txt.replace(old, new, 1))
              print("Applied Android startup lock fix to unix_socket.rs")
              sys.exit(0)
          elif new in txt:
              print("Startup lock patch already applied — skipping")
              sys.exit(2)
          else:
              print("ERROR: unexpected upstream change in unix_socket.rs — neither old nor new pattern found", file=sys.stderr)
              sys.exit(1)
          LOCKPYEOF
          LOCK_STATUS=$?
          set -e
          if [ "$LOCK_STATUS" -eq 0 ]; then
            if ! grep -qF '#[cfg(not(target_os = "android"))]' "$unix_socket_rs"; then
              echo "ERROR: Android cfg guard not found in unix_socket.rs after patch" >&2
              exit 1
            fi
            echo "Assertion passed: Android cfg guard present in unix_socket.rs"
          elif [ "$LOCK_STATUS" -eq 2 ]; then
            echo "Skipped: unix_socket.rs already fixed"
          else
            exit "$LOCK_STATUS"
          fi

          # Patch: fix installation_id lock for Android (resolve_installation_id)
          # Called unconditionally on every codex exec — will crash without this guard.
          # Remove once upstream openai/codex#26277 is merged.
          installation_id_rs="source-repo/codex-rs/core/src/installation_id.rs"
          set +e
          python3 - "$installation_id_rs" <<'INSTPYEOF'
          import sys, pathlib
          p = pathlib.Path(sys.argv[1])
          txt = p.read_text()
          old = '        file.lock()?;'
          new = '        #[cfg(not(target_os = "android"))]\n        file.lock()?;'
          if old in txt:
              p.write_text(txt.replace(old, new, 1))
              print("Applied Android lock fix to installation_id.rs")
              sys.exit(0)
          elif new in txt:
              print("installation_id.rs lock patch already applied — skipping")
              sys.exit(2)
          else:
              print("ERROR: unexpected upstream change in installation_id.rs — neither old nor new pattern found", file=sys.stderr)
              sys.exit(1)
          INSTPYEOF
          INST_STATUS=$?
          set -e
          if [ "$INST_STATUS" -eq 0 ]; then
            if ! grep -qF '#[cfg(not(target_os = "android"))]' "$installation_id_rs"; then
              echo "ERROR: Android cfg guard not found in installation_id.rs after patch" >&2
              exit 1
            fi
            echo "Assertion passed: Android cfg guard present in installation_id.rs"
          elif [ "$INST_STATUS" -eq 2 ]; then
            echo "Skipped: installation_id.rs already fixed"
          else
            exit "$INST_STATUS"
          fi

          # Patch: fix arg0 try_lock for Android (prepend_path_entry_for_codex_aliases)
          # Fail-safe (try_lock returns None on failure) but guard recommended for clarity.
          # Remove once upstream openai/codex#26277 is merged.
          arg0_rs="source-repo/codex-rs/arg0/src/lib.rs"
          set +e
          python3 - "$arg0_rs" <<'ARG0PYEOF'
          import sys, pathlib
          p = pathlib.Path(sys.argv[1])
          txt = p.read_text()
          old = '    lock_file.try_lock()?;'
          new = '    #[cfg(not(target_os = "android"))]\n    lock_file.try_lock()?;'
          if old in txt:
              p.write_text(txt.replace(old, new, 1))
              print("Applied Android try_lock fix to arg0/src/lib.rs")
              sys.exit(0)
          elif new in txt:
              print("arg0/lib.rs try_lock patch already applied — skipping")
              sys.exit(2)
          else:
              print("ERROR: unexpected upstream change in arg0/src/lib.rs (try_lock) — neither old nor new pattern found", file=sys.stderr)
              sys.exit(1)
          ARG0PYEOF
          ARG0_STATUS=$?
          set -e
          if [ "$ARG0_STATUS" -eq 0 ]; then
            echo "Assertion passed: arg0/lib.rs try_lock patched"
          elif [ "$ARG0_STATUS" -eq 2 ]; then
            echo "Skipped: arg0/lib.rs try_lock already fixed"
          else
            exit "$ARG0_STATUS"
          fi

          # Patch: fix try_lock_dir in janitor_cleanup for Android (best-effort, ENOTSUP -> skip dir)
          # On Android flock is unsupported, try_lock() returns an OS error that propagates through
          # try_lock_dir -> janitor_cleanup. Add Android cfg arm to treat unsupported errors as "skip dir".
          # Remove once upstream openai/codex#26277 is merged.
          set +e
          python3 - "$arg0_rs" <<'ARG0JANPYEOF'
          import sys, pathlib
          p = pathlib.Path(sys.argv[1])
          txt = p.read_text()
          old = '        Err(std::fs::TryLockError::WouldBlock) => Ok(None),\n        Err(err) => Err(err.into()),'
          new = '        Err(std::fs::TryLockError::WouldBlock) => Ok(None),\n        #[cfg(target_os = "android")]\n        Err(_) => Ok(None),\n        Err(err) => Err(err.into()),'
          if old in txt:
              p.write_text(txt.replace(old, new, 1))
              print("Applied Android try_lock_dir janitor fix to arg0/src/lib.rs")
              sys.exit(0)
          elif new in txt:
              print("arg0/lib.rs try_lock_dir patch already applied — skipping")
              sys.exit(2)
          else:
              print("ERROR: unexpected upstream change in arg0/src/lib.rs (try_lock_dir) — neither old nor new pattern found", file=sys.stderr)
              sys.exit(1)
          ARG0JANPYEOF
          ARG0JAN_STATUS=$?
          set -e
          if [ "$ARG0JAN_STATUS" -eq 0 ]; then
            echo "Assertion passed: arg0/lib.rs try_lock_dir patched"
          elif [ "$ARG0JAN_STATUS" -eq 2 ]; then
            echo "Skipped: arg0/lib.rs try_lock_dir already fixed"
          else
            exit "$ARG0JAN_STATUS"
          fi

          # Patch B: reduce TOKIO_WORKER_STACK_SIZE_BYTES for Android
          # 0.137.0+ added a thread spawn with 16 MiB stack (std::thread::Builder::stack_size).
          # Android pthread_create fails with ENOMEM at 16 MiB on /data partition.
          # Reduce to 8 MiB on Android as a safe interim value.
          set +e
          python3 - "$arg0_rs" <<'STACKPYEOF'
          import sys, pathlib
          p = pathlib.Path(sys.argv[1])
          txt = p.read_text()
          old = 'const TOKIO_WORKER_STACK_SIZE_BYTES: usize = 16 * 1024 * 1024;'
          new = '#[cfg(not(target_os = "android"))]\nconst TOKIO_WORKER_STACK_SIZE_BYTES: usize = 16 * 1024 * 1024;\n#[cfg(target_os = "android")]\nconst TOKIO_WORKER_STACK_SIZE_BYTES: usize = 8 * 1024 * 1024; // pthread_create fails with 16 MiB on Android'
          if old in txt:
              p.write_text(txt.replace(old, new, 1))
              print("Applied Android stack size patch to arg0/src/lib.rs")
              sys.exit(0)
          elif new in txt:
              print("Stack size patch already applied — skipping")
              sys.exit(2)
          else:
              print("TOKIO_WORKER_STACK_SIZE_BYTES not found — skipping (may not apply to this version)")
              sys.exit(2)
          STACKPYEOF
          STACK_STATUS=$?
          set -e
          if [ "$STACK_STATUS" -eq 0 ]; then
            echo "Assertion passed: Android stack size patch applied"
          elif [ "$STACK_STATUS" -eq 2 ]; then
            echo "Skipped: stack size patch not needed for this version"
          else
            exit "$STACK_STATUS"
          fi

      - name: Patch reqwest TLS to rustls for Android cross-compile
        run: |
          set -eu
          WORKSPACE_CARGO="source-repo/codex-rs/Cargo.toml"
          if [ -f "$WORKSPACE_CARGO" ]; then
            python3 "host-repo/scripts/patch-reqwest-tls.py" "$WORKSPACE_CARGO"
            echo "Verifying: openssl-sys should not be in dependency graph"
            cd source-repo/codex-rs && cargo tree --target aarch64-linux-android -i openssl-sys 2>&1 | head -5 || echo "openssl-sys not found (expected)"
          fi

      - name: Diagnose openssl-sys dependency path
        run: |
          set -eu
          cd source-repo/codex-rs
          echo '=== openssl-sys dependency tree ==='
          cargo tree --target aarch64-linux-android -p codex-cli -i openssl-sys 2>&1 || echo 'openssl-sys not found in codex-cli'
          cargo tree --target aarch64-linux-android -p codex-exec -i openssl-sys 2>&1 || echo 'openssl-sys not found in codex-exec'
          echo '=== workspace openssl references ==='
          grep -r 'openssl\|native-tls' --include=Cargo.toml . | grep -v 'target/' | grep -v '.cargo/' || true

      - name: Build codex Android binaries
        env:
          CARGO_INCREMENTAL: "0"
          CARGO_PROFILE_RELEASE_DEBUG: "0"
          CARGO_PROFILE_RELEASE_OPT_LEVEL: "1"
          CARGO_PROFILE_RELEASE_LTO: "false"
        run: |
          set -euo pipefail
          on_term() {
            echo "=== received SIGTERM: memory/disk snapshot ==="
            free -h
            df -h /home/runner /tmp
            exit 143
          }
          trap on_term TERM
          echo "=== memory/disk before build ===" && free -h && df -h /home/runner /tmp && ulimit -a
          cd source-repo/codex-rs
          RT_LIB=$(find "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/lib" \
            -name "libclang_rt.builtins-aarch64-android.a" 2>/dev/null | head -1)
          echo "=== compiler-rt ==="
          # shellcheck disable=SC2015
          test -f "$RT_LIB" && echo "found: $RT_LIB" || { echo 'ERROR: libclang_rt.builtins not found'; exit 1; }
          # shellcheck disable=SC2015
          "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-nm" \
            -g --defined-only "$RT_LIB" 2>/dev/null | grep -q '__clear_cache' \
            && echo '__clear_cache: confirmed in RT_LIB' \
            || echo '__clear_cache: not found in RT_LIB (may still link via other path)'
          export RUSTFLAGS="${RUSTFLAGS:-} -C link-arg=-fuse-ld=lld -C debuginfo=0 -C link-arg=$RT_LIB"
          echo "Building codex-cli..."
          cargo +"${RUST_VERSION}" build --jobs=1 --target "${ANDROID_TARGET}" --release -p codex-cli 2>&1 | tee /tmp/build-codex-cli.log
          echo "=== memory/disk after codex-cli ===" && free -h && df -h /home/runner /tmp
          echo "Building codex-exec..."
          cargo +"${RUST_VERSION}" build --jobs=1 --target "${ANDROID_TARGET}" --release -p codex-exec 2>&1 | tee /tmp/build-codex-exec.log
          echo "=== memory/disk after build ===" && free -h && df -h /home/runner /tmp

      - name: Assemble bundle and manifest
        run: |
          set -eu
          rm -rf "$BUNDLE_DIR"
          mkdir -p "$BUNDLE_DIR"

          cp "source-repo/codex-rs/target/${ANDROID_TARGET}/release/codex" "$BUNDLE_DIR/codex"
          cp "source-repo/codex-rs/target/${ANDROID_TARGET}/release/codex-exec" "$BUNDLE_DIR/codex-exec"
          cp "$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android/libc++_shared.so" "$BUNDLE_DIR/libc++_shared.so"

          NDK_LLVM_STRIP="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip"
          CODEX_SIZE_BEFORE=$(wc -c < "$BUNDLE_DIR/codex")
          CODEX_EXEC_SIZE_BEFORE=$(wc -c < "$BUNDLE_DIR/codex-exec")

          "$NDK_LLVM_STRIP" --strip-all "$BUNDLE_DIR/codex"
          "$NDK_LLVM_STRIP" --strip-all "$BUNDLE_DIR/codex-exec"

          CODEX_SIZE_AFTER=$(wc -c < "$BUNDLE_DIR/codex")
          CODEX_EXEC_SIZE_AFTER=$(wc -c < "$BUNDLE_DIR/codex-exec")
          awk -v b="$CODEX_SIZE_BEFORE" -v a="$CODEX_SIZE_AFTER" \
            'BEGIN { printf "codex: %d -> %d bytes (%.1f%% reduction)\n", b, a, (b-a)/b*100 }'
          awk -v b="$CODEX_EXEC_SIZE_BEFORE" -v a="$CODEX_EXEC_SIZE_AFTER" \
            'BEGIN { printf "codex-exec: %d -> %d bytes (%.1f%% reduction)\n", b, a, (b-a)/b*100 }'

          SOURCE_REPOSITORY="$GITHUB_REPOSITORY" \
          SOURCE_REPOSITORY_INPUT="${{ inputs.source_repository }}" \
          SOURCE_REF_INPUT="${{ inputs.source_ref }}" \
          SOURCE_SHA="$(git -C source-repo rev-parse HEAD)" \
          HOST_REPOSITORY="$GITHUB_REPOSITORY" \
          HOST_REF="${GITHUB_REF_NAME}" \
          HOST_SHA="$(git -C host-repo rev-parse HEAD)" \
          WORKFLOW_RUN_ID="$GITHUB_RUN_ID" \
          WORKFLOW_RUN_ATTEMPT="$GITHUB_RUN_ATTEMPT" \
          WORKFLOW_NAME="$GITHUB_WORKFLOW" \
          BUILD_TIMESTAMP_UTC="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
          RUST_VERSION="$RUST_VERSION" \
          ANDROID_NDK_REVISION="$ANDROID_NDK_REVISION" \
          ANDROID_NDK_ARCHIVE_URL="$ANDROID_NDK_ARCHIVE_URL" \
          ANDROID_NDK_ARCHIVE_SIZE="$ANDROID_NDK_ARCHIVE_SIZE" \
          ANDROID_NDK_ARCHIVE_SHA256="$ANDROID_NDK_ARCHIVE_SHA256" \
          V8_ARTIFACT_MODE="$V8_ARTIFACT_MODE" \
          V8_ARTIFACT_SOURCE="$V8_ARTIFACT_SOURCE" \
          RUSTY_V8_RELEASE_TAG="$RUSTY_V8_RELEASE_TAG" \
          bash host-repo/scripts/write-external-build-manifest.sh "$BUNDLE_DIR"

      - name: Generate license compliance files
        run: |
          set -eu

          # B1: PATCHES.md — exact source diffs applied before build
          {
            echo "# Applied Android Patches"
            echo ""
            echo "Source repository: ${{ inputs.source_repository }}"
            echo "Source ref: ${{ inputs.source_ref }}"
            echo "Source SHA: $(git -C source-repo rev-parse HEAD)"
            echo "Built by: ${GITHUB_REPOSITORY} @ ${GITHUB_REF_NAME} ($(git -C host-repo rev-parse HEAD))"
            echo "Build timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo ""
            echo "## Modified Files (stat)"
            git -C source-repo diff --stat HEAD || echo "(no modifications — upstream already included fix)"
            echo ""
            echo "## Full Diff"
            git -C source-repo diff HEAD || echo "(no modifications)"
          } > "$BUNDLE_DIR/PATCHES.md"

          # B2: LLVM-LICENSE.TXT — from NDK toolchain (Apache-2.0 WITH LLVM-exception)
          echo "=== NDK LLVM NOTICE candidates ==="
          for p in \
            "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/NOTICE" \
            "$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/NOTICE" \
            "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/lib64/clang"/*/NOTICE \
            "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/lib/clang"/*/NOTICE \
            "$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/lib64/clang"/*/NOTICE; do
            [ -f "$p" ] && echo "  found: $p (has LLVM-exception: $(grep -q 'LLVM-exception' "$p" && echo yes || echo no))"
          done
          LLVM_NOTICE=""
          for candidate in \
            "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/NOTICE" \
            "$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/NOTICE" \
            "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/lib64/clang"/*/NOTICE \
            "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/lib/clang"/*/NOTICE \
            "$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/lib64/clang"/*/NOTICE; do
            if [ -f "$candidate" ] && grep -q "LLVM-exception" "$candidate"; then
              LLVM_NOTICE="$candidate"
              break
            fi
          done
          if [ -z "$LLVM_NOTICE" ]; then
            echo "Glob search found no match; trying find-based fallback..."
            NDK_SEARCH="${ANDROID_NDK_HOME:-${ANDROID_NDK_ROOT:-}}"
            LLVM_NOTICE=$(find "$NDK_SEARCH" -path "*/toolchains/llvm*" -name "NOTICE" -type f -print0 2>/dev/null \
              | xargs -0 grep -l "LLVM-exception" 2>/dev/null | head -1 || true)
          fi
          if [ -n "$LLVM_NOTICE" ]; then
            echo "Using NDK LLVM NOTICE: $LLVM_NOTICE"
            cp "$LLVM_NOTICE" "$BUNDLE_DIR/LLVM-LICENSE.TXT"
            echo "Verified: LLVM-exception clause present in LLVM-LICENSE.TXT"
          else
            echo "ERROR: NDK clang NOTICE not found (LLVM-exception clause missing in all candidates)" >&2
            exit 1
          fi

          # B3: dependency-licenses.json — cargo-license for all transitive deps
          cd source-repo/codex-rs
          cargo install cargo-license --locked --quiet
          cargo license \
            --avoid-dev-deps \
            --json \
            > "$BUNDLE_DIR/dependency-licenses.json"
          ENTRY_COUNT=$(python3 -c "import json; d=json.load(open('$BUNDLE_DIR/dependency-licenses.json')); print(len(d))")
          echo "Generated dependency-licenses.json (${ENTRY_COUNT} entries)"

      - name: Verify bundle contents
        run: |
          set -eu
          find "$BUNDLE_DIR" -maxdepth 1 -type f -print | sort
          test -f "$BUNDLE_DIR/codex"
          test -f "$BUNDLE_DIR/codex-exec"
          test -f "$BUNDLE_DIR/libc++_shared.so"
          test -f "$BUNDLE_DIR/manifest.json"
          test -f "$BUNDLE_DIR/sha256sums.txt"

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: codex-external-android-aarch64-build-logs-${{ github.run_id }}
          path: |
            /tmp/build-codex-cli.log
            /tmp/build-codex-exec.log
          if-no-files-found: warn

      - name: Upload artifact bundle
        uses: actions/upload-artifact@v7
        with:
          name: codex-external-android-aarch64-${{ github.run_id }}
          path: ${{ env.BUNDLE_DIR }}
          if-no-files-found: error

  dispatch-stage:
    needs: [record-run-id, build]
    if: needs.build.result == 'success' && needs.record-run-id.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Dispatch auto-stage-candidate
        run: |
          set -eu
          gh workflow run auto-stage-candidate.yml \
            --repo bash0816/Codex-Termux \
            -f build_run_id=${{ github.run_id }}
          echo "Dispatched auto-stage-candidate.yml for build run ${{ github.run_id }}"
