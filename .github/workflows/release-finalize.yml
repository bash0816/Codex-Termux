name: Release Finalize

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to finalize (e.g. 0.133.0)"
        required: true
      release_notes:
        description: "Public release summary (1-3 lines)"
        required: false
        default: ""

concurrency:
  group: release-finalize-${{ inputs.version }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    env:
      VER: ${{ inputs.version }}
      NOTES: ${{ inputs.release_notes }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Validate version format
        run: |
          set -eu
          echo "$VER" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9a-zA-Z.]+)?(\.[0-9]+)?$' || {
            echo "ERROR: Invalid version format: $VER" >&2
            exit 1
          }

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Verify npm latest
        run: |
          set -eu
          published=$(npm view "@bash0816/codex-termux@${VER}" version 2>/dev/null || echo "")
          if [ "$published" != "$VER" ]; then
            echo "ERROR: @bash0816/codex-termux@${VER} not published on npm" >&2
            exit 1
          fi
          actual_latest=$(npm view "@bash0816/codex-termux" "dist-tags.latest" 2>/dev/null || echo "")
          if [ "$actual_latest" != "$VER" ]; then
            echo "ERROR: dist-tags.latest=$actual_latest, expected $VER" >&2
            exit 1
          fi
          echo "npm latest confirmed: $VER"

      - uses: actions/checkout@v7
        with:
          token: ${{ github.token }}

      - name: Update README and RELEASES.md on feature branch then open PR
        run: |
          set -eu
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          branch="automation/docs-${VER}"
          git checkout -b "$branch"

          # (A) Status セクションのみ更新
          if ! grep -qE "^## Status" README.md; then
            echo "ERROR: ## Status section not found" >&2; exit 1
          fi
          sed -i -E "/^## Status/,/^##[[:space:]]/{s|codex-termux@[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?|codex-termux@${VER}|g}" README.md
          if ! sed -n "/^## Status/,/^##[[:space:]]/p" README.md | grep -qF "codex-termux@${VER}"; then
            echo "ERROR: Status section update failed" >&2; exit 1
          fi
          echo "README Status section updated to $VER"

          # (B) Latest audited version
          if ! grep -qE "Latest audited version:" README.md; then
            echo "ERROR: Latest audited version line not found" >&2; exit 1
          fi
          sed -i -E "s/Latest audited version: \`[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?\`/Latest audited version: \`${VER}\`/" README.md
          if ! grep -qF "Latest audited version: \`${VER}\`" README.md; then
            echo "ERROR: Latest audited version update failed" >&2; exit 1
          fi

          # (C) Tracked versions
          if ! grep -qF "Tracked versions:" README.md; then
            echo "ERROR: Tracked versions line not found" >&2; exit 1
          fi
          if grep -F "Tracked versions:" README.md | grep -Fq "\`${VER}\`"; then
            echo "README tracked versions already contains ${VER}"
          else
            sed -i -E "s/(Tracked versions:.*\`[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?\`)[[:space:]]*$/\1, \`${VER}\`/" README.md
            if ! grep -F "Tracked versions:" README.md | grep -Fq "\`${VER}\`"; then
              echo "ERROR: Tracked versions append failed" >&2; exit 1
            fi
          fi

          date_str=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          notes="$NOTES"
          [ -z "$notes" ] && notes="upstream openai/codex@${VER} 追従。"
          entry="## ${VER} — ${date_str}\n\n${notes}\n\n### Install\n\n\`\`\`sh\nnpm install -g @bash0816/codex-termux@${VER}\ncodex --version\n\`\`\`\n\n"
          if [ -f RELEASES.md ] && grep -qE "^## ${VER}([[:space:]]|$)" RELEASES.md; then
            echo "RELEASES.md already has ${VER} entry"
          else
            printf "%b" "${entry}" > /tmp/new_entry.md
            if [ -f RELEASES.md ]; then
              cat /tmp/new_entry.md RELEASES.md > /tmp/releases_new.md
              mv /tmp/releases_new.md RELEASES.md
            else
              mv /tmp/new_entry.md RELEASES.md
            fi
          fi

          git add README.md RELEASES.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "docs: update README and RELEASES for ${VER}"
          git push --force-with-lease origin "$branch"

          existing_pr=$(gh pr list --base main --head "$branch" --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$existing_pr" ]; then
            pr_number="$existing_pr"
            echo "Reusing existing PR #${pr_number}"
          else
            pr_url=$(gh pr create --base main --head "$branch" \
              --title "docs: update README and RELEASES for ${VER}" \
              --body "Automated docs update for @bash0816/codex-termux@${VER}. Open PR only.")
            pr_number=$(echo "$pr_url" | grep -oE '[0-9]+$')
            echo "PR created: $pr_url"
          fi

      - name: Enable auto-merge on docs PR
        run: |
          set -eu
          branch="automation/docs-${VER}"
          pr_num=$(gh pr list --repo bash0816/Codex-Termux \
            --base main --head "$branch" --state open \
            --json number --jq '.[0].number // empty')
          if [ -n "$pr_num" ]; then
            gh pr merge "$pr_num" --squash --delete-branch
            echo "Auto-merge enabled on docs PR #${pr_num}"
          else
            echo "No open docs PR found, skipping"
          fi

      - name: Close candidate tracking PR
        run: |
          set -eu
          branch="automation/codex-${VER}"
          pr_num=$(gh pr list --repo bash0816/Codex-Termux \
            --base main --head "$branch" --state open \
            --json number --jq '.[0].number // empty')
          if [ -n "$pr_num" ]; then
            gh pr close "$pr_num" \
              --comment "Released as @bash0816/codex-termux@${VER} (latest). Auto-closing."
            echo "Closed candidate PR #${pr_num}"
          else
            echo "No open candidate PR found"
          fi
