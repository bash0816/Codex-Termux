name: build-rusty-v8-android

on:
  workflow_dispatch:
    inputs:
      v8_version:
        description: 'v8 crate exact version (e.g. 146.4.0)'
        required: true
        type: string
        default: '146.4.0'
      rust_version:
        description: 'Rust toolchain version'
        required: false
        default: '1.93.0'
        type: string
      android_ndk_revision:
        description: 'Android NDK revision'
        required: false
        default: 'r27c'
        type: string
      android_api_level:
        description: 'Android API level'
        required: false
        default: '29'
        type: string
      force_rebuild:
        description: 'Rebuild even if release assets already exist'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

# Requires: default GITHUB_TOKEN with contents:write (set below).
# No extra secrets needed.

permissions:
  contents: read

jobs:
  release:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    env:
      ANDROID_TARGET: aarch64-linux-android
      V8_VERSION: ${{ inputs.v8_version }}
      RUST_VERSION: ${{ inputs.rust_version || '1.93.0' }}
      NDK_REVISION: ${{ inputs.android_ndk_revision || 'r27c' }}
      ANDROID_API_LEVEL: ${{ inputs.android_api_level || '29' }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Set RELEASE_TAG
        run: echo "RELEASE_TAG=rusty-v8-v${V8_VERSION}" >> "$GITHUB_ENV"

      - name: Check if release assets already exist
        id: check_release
        if: inputs.force_rebuild != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          exists=false
          needed_archive="librusty_v8_release_aarch64-linux-android.a.gz"
          needed_binding="src_binding_release_aarch64-linux-android.rs"
          jq_expr='.assets | map(.name) | (contains(["'"${needed_archive}"'"]) and contains(["'"${needed_binding}"'"])) | tostring'
          result=$(gh release view "${RELEASE_TAG}" --repo "$GITHUB_REPOSITORY" \
            --json assets --jq "$jq_expr" 2>/dev/null || echo "false")
          if [ "$result" = "true" ]; then
            exists=true
            echo "Release ${RELEASE_TAG} already has all required assets."
          fi
          echo "exists=$exists" >> "$GITHUB_OUTPUT"

      - name: Skip (release exists)
        if: steps.check_release.outputs.exists == 'true'
        run: |
          echo "Release ${RELEASE_TAG} already exists with all required assets."
          echo "Set force_rebuild=true to force a rebuild."

      # ── build path ─────────────────────────────────────────────────────────

      - name: Free disk space
        if: steps.check_release.outputs.exists != 'true'
        run: |
          set -eu
          sudo rm -rf \
            /usr/share/dotnet \
            /opt/ghc \
            /usr/local/share/boost \
            /usr/local/lib/android \
            /usr/share/swift \
            "$AGENT_TOOLSDIRECTORY" \
            /opt/hostedtoolcache/node \
            /opt/hostedtoolcache/Python || true
          sudo docker image prune -af 2>/dev/null || true
          df -h

      - name: Install system dependencies
        if: steps.check_release.outputs.exists != 'true'
        run: |
          set -eu
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libclang-dev clang-14 ninja-build python3 \
            pkg-config libglib2.0-dev curl ca-certificates git

      - name: Download prebuilt GN
        if: steps.check_release.outputs.exists != 'true'
        run: |
          set -eu
          gn_dir="$RUNNER_TEMP/gn-bin"
          mkdir -p "$gn_dir"
          curl -fsSL \
            "https://chrome-infra-packages.appspot.com/dl/gn/gn/linux-amd64/+/latest" \
            -o "$gn_dir/gn.zip"
          cd "$gn_dir"
          unzip -q gn.zip gn
          chmod +x gn
          "$gn_dir/gn" --version
          echo "GN=$gn_dir/gn" >> "$GITHUB_ENV"
          echo "NINJA=$(command -v ninja)" >> "$GITHUB_ENV"

      - name: Install Rust
        if: steps.check_release.outputs.exists != 'true'
        run: |
          set -eu
          rustup toolchain install "${RUST_VERSION}" --profile minimal
          rustup target add "${ANDROID_TARGET}" --toolchain "${RUST_VERSION}"
          rustup default "${RUST_VERSION}"

      - name: Download Android NDK
        if: steps.check_release.outputs.exists != 'true'
        run: |
          set -eu
          ndk_zip="$RUNNER_TEMP/android-ndk-${NDK_REVISION}.zip"
          ndk_dir="$RUNNER_TEMP/android-ndk-${NDK_REVISION}"
          curl -fsSL "https://dl.google.com/android/repository/android-ndk-${NDK_REVISION}-linux.zip" -o "$ndk_zip"
          unzip -q "$ndk_zip" -d "$RUNNER_TEMP"
          test -d "$ndk_dir"
          toolchain="$ndk_dir/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "ANDROID_NDK_HOME=$ndk_dir" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ndk_dir" >> "$GITHUB_ENV"
          echo "CC_aarch64_linux_android=$toolchain/aarch64-linux-android${ANDROID_API_LEVEL}-clang" >> "$GITHUB_ENV"
          echo "CXX_aarch64_linux_android=$toolchain/aarch64-linux-android${ANDROID_API_LEVEL}-clang++" >> "$GITHUB_ENV"
          echo "AR_aarch64_linux_android=$toolchain/llvm-ar" >> "$GITHUB_ENV"
          echo "RANLIB_aarch64_linux_android=$toolchain/llvm-ranlib" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$toolchain/aarch64-linux-android${ANDROID_API_LEVEL}-clang" >> "$GITHUB_ENV"

      - name: Create minimal v8 build crate
        if: steps.check_release.outputs.exists != 'true'
        run: |
          set -eu
          build_dir="$RUNNER_TEMP/v8-build-crate"
          mkdir -p "$build_dir/src"
          printf '[package]\nname = "v8-android-build"\nversion = "0.1.0"\nedition = "2021"\n\n[dependencies]\nv8 = "=%s"\n' \
            "${V8_VERSION}" > "$build_dir/Cargo.toml"
          printf 'fn main() {}\n' > "$build_dir/src/main.rs"
          echo "BUILD_CRATE_DIR=$build_dir" >> "$GITHUB_ENV"

      - name: Build librusty_v8 from source
        if: steps.check_release.outputs.exists != 'true'
        shell: bash
        env:
          V8_FROM_SOURCE: "1"
          LIBCLANG_PATH: /usr/lib/llvm-14/lib
          CARGO_TARGET_DIR: ${{ runner.temp }}/v8-target
          RUST_BACKTRACE: '1'
          PRINT_GN_ARGS: '1'
        run: |
          set -Eeuo pipefail

          # Plan B: clone rusty_v8 source with required submodules
          # (crate tarball is incomplete - missing build/android, third_party/rust, etc.)
          RV8_SRC="$RUNNER_TEMP/rusty_v8_src"
          git clone --depth=1 --branch "v${V8_VERSION}" \
            https://github.com/denoland/rusty_v8.git "$RV8_SRC"
          # Init required submodules (v8/ is downloaded by build.rs)
          git -C "$RV8_SRC" submodule update --init --depth=1 build
          git -C "$RV8_SRC" submodule update --init --depth=1 third_party/rust
          git -C "$RV8_SRC" submodule update --init --depth=1 tools/clang
          git -C "$RV8_SRC" submodule update --init --depth=1 buildtools
          git -C "$RV8_SRC" submodule update --init --depth=1 third_party/icu
          git -C "$RV8_SRC" submodule update --init --depth=1 third_party/libc++/src
          git -C "$RV8_SRC" submodule update --init --depth=1 third_party/libc++abi/src
          git -C "$RV8_SRC" submodule update --init --depth=1 third_party/jinja2
          git -C "$RV8_SRC" submodule update --init --depth=1 third_party/markupsafe
          # Fetch v8/DEPS only (needed by tools/v8_deps.py → tools/rust_toolchain.py)
          V8_SHA=$(git -C "$RV8_SRC" ls-tree HEAD v8 | awk '{print $3}')
          V8_URL=$(git -C "$RV8_SRC" config --file .gitmodules submodule.v8.url)
          mkdir -p "$RV8_SRC/v8"
          git init -q "$RV8_SRC/v8"
          git -C "$RV8_SRC/v8" remote add origin "$V8_URL"
          git -C "$RV8_SRC/v8" fetch --depth=1 origin "$V8_SHA"
          git -C "$RV8_SRC/v8" checkout FETCH_HEAD -- DEPS
          echo "v8/DEPS fetched ($(wc -l < "$RV8_SRC/v8/DEPS") lines)"
          echo "rusty_v8 source ready: $(du -sh "$RV8_SRC" | cut -f1)"

          # Install host amd64 sysroot (required by sysroot.gni)
          if [ -f "$RV8_SRC/build/linux/sysroot_scripts/install-sysroot.py" ]; then
            cd "$RV8_SRC"
            python3 build/linux/sysroot_scripts/install-sysroot.py --arch=amd64
            cd "$RUNNER_TEMP"
            echo "Host amd64 sysroot installed"
          fi

          # Build using rusty_v8 source via [patch.crates-io]
          build_dir="$RUNNER_TEMP/v8-build-crate"
          mkdir -p "$build_dir/src"
          printf '[package]\nname = "v8-android-build"\nversion = "0.1.0"\nedition = "2021"\n\n[dependencies]\nv8 = "=%s"\n\n[patch.crates-io]\nv8 = { path = "%s" }\n' \
            "${V8_VERSION}" "$RV8_SRC" > "$build_dir/Cargo.toml"
          printf 'fn main() {}\n' > "$build_dir/src/main.rs"

          cd "$build_dir"
          cargo +"${RUST_VERSION}" build --target "${ANDROID_TARGET}" --release -vv \
            2>&1 | tee "$RUNNER_TEMP/v8-build.log"

      - name: Locate and package artifacts
        if: steps.check_release.outputs.exists != 'true'
        shell: bash
        env:
          CARGO_TARGET_DIR: ${{ runner.temp }}/v8-target
        run: |
          set -Eeuo pipefail
          archive_file="${CARGO_TARGET_DIR}/${ANDROID_TARGET}/release/gn_out/obj/librusty_v8.a"
          binding_file="${CARGO_TARGET_DIR}/${ANDROID_TARGET}/release/gn_out/src_binding.rs"
          test -f "$archive_file" || { echo 'ERROR: archive not found' >&2; find "$CARGO_TARGET_DIR" -name '*.a' 2>/dev/null | head -50; exit 1; }
          test -f "$binding_file" || { echo 'ERROR: binding not found' >&2; exit 1; }
          echo "Found archive: $archive_file"
          echo "Found binding: $binding_file"

          artifacts_dir="$RUNNER_TEMP/rusty-v8-artifacts"
          mkdir -p "$artifacts_dir"
          gzip -c "$archive_file" > "$artifacts_dir/librusty_v8_release_${ANDROID_TARGET}.a.gz"
          cp "$binding_file" "$artifacts_dir/src_binding_release_${ANDROID_TARGET}.rs"

          archive_sha=$(sha256sum "$artifacts_dir/librusty_v8_release_${ANDROID_TARGET}.a.gz" | awk '{print $1}')
          binding_sha=$(sha256sum "$artifacts_dir/src_binding_release_${ANDROID_TARGET}.rs" | awk '{print $1}')

          echo "ARTIFACTS_DIR=$artifacts_dir" >> "$GITHUB_ENV"
          echo "ARCHIVE_SHA256=$archive_sha" >> "$GITHUB_ENV"
          echo "BINDING_SHA256=$binding_sha" >> "$GITHUB_ENV"

          echo "archive sha256: $archive_sha"
          echo "binding sha256: $binding_sha"

      - name: Create GitHub Release and upload assets
        if: steps.check_release.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          notes_file="$RUNNER_TEMP/release-notes.md"
          printf 'Self-built rusty_v8 for aarch64-linux-android.\n\nv8==%s, NDK %s, Rust %s\n\n- `librusty_v8_release_aarch64-linux-android.a.gz` sha256: `%s`\n- `src_binding_release_aarch64-linux-android.rs` sha256: `%s`\n' \
            "${V8_VERSION}" "${NDK_REVISION}" "${RUST_VERSION}" \
            "${ARCHIVE_SHA256}" "${BINDING_SHA256}" > "$notes_file"
          gh release create "${RELEASE_TAG}" \
            --repo "$GITHUB_REPOSITORY" \
            --title "rusty_v8 ${RELEASE_TAG} aarch64-linux-android" \
            --notes-file "$notes_file" \
            --prerelease 2>/dev/null || true

          gh release upload "${RELEASE_TAG}" \
            "${ARTIFACTS_DIR}/librusty_v8_release_${ANDROID_TARGET}.a.gz" \
            "${ARTIFACTS_DIR}/src_binding_release_${ANDROID_TARGET}.rs" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

      - name: Update android-artifacts.toml with self-built checksums
        if: steps.check_release.outputs.exists != 'true'
        run: |
          set -eu
          printf '[versions."%s"]\nsource_tag = "v%s"\n\n[versions."%s".targets."%s"]\nrepository = "%s"\nrelease_tag = "%s"\narchive_sha256 = "%s"\nbinding_sha256 = "%s"\n' \
            "${V8_VERSION}" "${V8_VERSION}" \
            "${V8_VERSION}" "${ANDROID_TARGET}" \
            "${GITHUB_REPOSITORY}" "${RELEASE_TAG}" \
            "${ARCHIVE_SHA256}" "${BINDING_SHA256}" \
            > third_party/v8/android-artifacts.toml
          echo "Updated third_party/v8/android-artifacts.toml"
          cat third_party/v8/android-artifacts.toml

      - name: Commit and push manifest update
        if: steps.check_release.outputs.exists != 'true'
        env:
          BRANCH_NAME: bot/rusty-v8-update-${{ inputs.v8_version }}
        run: |
          set -eu
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH_NAME"
          git add third_party/v8/android-artifacts.toml
          git diff --cached --quiet || \
            git commit -m "v8 ${V8_VERSION} Android artifact: self-built (${RELEASE_TAG})"
          git push -u origin "$BRANCH_NAME"

      - name: Create PR for manifest update
        if: steps.check_release.outputs.exists != 'true'
        env:
          BRANCH_NAME: bot/rusty-v8-update-${{ inputs.v8_version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          gh pr create \
            --repo "$GITHUB_REPOSITORY" \
            --base main \
            --head "$BRANCH_NAME" \
            --title "v8 ${V8_VERSION} Android artifact update" \
            --body "Automated update for rusty_v8 Android artifacts.\n\n- version: ${V8_VERSION}\n- release tag: ${RELEASE_TAG}"

      - name: Dump v8 GN diagnostics
        if: failure() && steps.check_release.outputs.exists != 'true'
        shell: bash
        env:
          CARGO_TARGET_DIR: ${{ runner.temp }}/v8-target
        run: |
          find "$CARGO_TARGET_DIR" -path '*/gn_out/args.gn' -print -exec sed -n '1,50p' {} \; || true
          find "$CARGO_TARGET_DIR" -path '*/gn_out/*.log' -print -exec sed -n '1,50p' {} \; || true

      - name: Upload build log
        if: always() && steps.check_release.outputs.exists != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: v8-build-log-${{ github.run_id }}
          path: ${{ runner.temp }}/v8-build.log
          if-no-files-found: ignore
