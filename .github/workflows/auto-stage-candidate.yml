name: Auto Stage Candidate

on:
  workflow_dispatch:
    inputs:
      build_run_id:
        description: "Run ID of the external-build-android-aarch64 workflow to stage"
        required: true
        type: string

permissions:
  contents: write
  actions: read
  pull-requests: write

jobs:
  stage:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Verify build run identity and success
        env:
          BUILD_RUN_ID: ${{ inputs.build_run_id }}
        run: |
          set -eu
          run_json=$(gh api "repos/bash0816/Codex-Termux/actions/runs/${BUILD_RUN_ID}")
          run_path=$(node -p "JSON.parse(process.argv[1]).path" "$run_json")
          conclusion=$(node -p "JSON.parse(process.argv[1]).conclusion" "$run_json")
          status=$(node -p "JSON.parse(process.argv[1]).status" "$run_json")
          if [ "$run_path" != ".github/workflows/external-build-android-aarch64.yml" ]; then
            echo "ERROR: run $BUILD_RUN_ID is not from external-build-android-aarch64.yml (path: $run_path)" >&2
            exit 1
          fi
          if [ "$status" != "completed" ] || [ "$conclusion" != "success" ]; then
            echo "ERROR: run $BUILD_RUN_ID is not a successful completed run (status=$status conclusion=$conclusion)" >&2
            exit 1
          fi
          echo "Verified: run $BUILD_RUN_ID is a successful external-build-android-aarch64.yml run"

      - uses: actions/checkout@v7
        with:
          ref: main
          token: ${{ github.token }}
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Download artifact
        env:
          WORKFLOW_RUN_ID: ${{ inputs.build_run_id }}
        run: |
          set -eu
          mkdir -p /tmp/codex-artifact
          gh run download "$WORKFLOW_RUN_ID" \
            --repo bash0816/Codex-Termux \
            --name "codex-external-android-aarch64-${WORKFLOW_RUN_ID}" \
            --dir /tmp/codex-artifact
          echo "ARTIFACT_DIR=/tmp/codex-artifact" >> "$GITHUB_ENV"

      - name: Verify and extract artifact metadata
        id: artifact
        env:
          WORKFLOW_RUN_ID: ${{ inputs.build_run_id }}
        run: |
          set -eu
          MANIFEST_FILE="$ARTIFACT_DIR/manifest.json"

          source_repo=$(node -p "JSON.parse(require('fs').readFileSync('${MANIFEST_FILE}','utf8')).source.repository")
          source_ref=$(node -p "JSON.parse(require('fs').readFileSync('${MANIFEST_FILE}','utf8')).source.ref")
          source_sha=$(node -p "JSON.parse(require('fs').readFileSync('${MANIFEST_FILE}','utf8')).source.sha")
          manifest_run_id=$(node -p "JSON.parse(require('fs').readFileSync('${MANIFEST_FILE}','utf8')).workflow.run_id")

          if [ "$source_repo" != "openai/codex" ]; then
            echo "ERROR: unexpected source.repository: $source_repo" >&2
            exit 1
          fi
          if [ "$manifest_run_id" != "$WORKFLOW_RUN_ID" ]; then
            echo "ERROR: manifest run_id $manifest_run_id != event run_id $WORKFLOW_RUN_ID" >&2
            exit 1
          fi

          ver="${source_ref#rust-v}"
          echo "$ver" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$' || {
            echo "ERROR: unexpected source.ref format: $source_ref" >&2
            exit 1
          }

          {
            echo "ver=$ver"
            echo "source_ref=$source_ref"
            echo "source_sha=$source_sha"
          } >> "$GITHUB_OUTPUT"
          echo "Verified: codex $ver from openai/codex ($source_ref)"

      - name: Check candidate branch state
        id: check_state
        env:
          VER: ${{ steps.artifact.outputs.ver }}
          BUILD_RUN_ID: ${{ inputs.build_run_id }}
        run: |
          set -eu
          branch="automation/codex-${VER}"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

          if ! git fetch origin "$branch:refs/remotes/origin/$branch" 2>/dev/null; then
            echo "should_stage=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: branch $branch not found"
            exit 0
          fi

          git show "origin/$branch:config/codex-termux-release-manifest.json" > /tmp/candidate-manifest.json

          candidate_ver=$(node -p "JSON.parse(require('fs').readFileSync('/tmp/candidate-manifest.json','utf8')).latest_candidate_version")
          candidate_state=$(node -p "JSON.parse(require('fs').readFileSync('/tmp/candidate-manifest.json','utf8')).candidate_state_status")
          expected_run_id=$(node -p "JSON.parse(require('fs').readFileSync('/tmp/candidate-manifest.json','utf8')).expected_build_run_id || ''")

          if [ "$candidate_ver" = "$VER" ] && [ "$candidate_state" = "codex_build_dispatched" ] && [ "$expected_run_id" = "$BUILD_RUN_ID" ]; then
            echo "should_stage=true" >> "$GITHUB_OUTPUT"
            echo "Candidate state OK: $candidate_state (version $candidate_ver, run $BUILD_RUN_ID matches expected_build_run_id)"
          else
            echo "should_stage=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: branch $branch candidate version=$candidate_ver state=$candidate_state expected_run_id=$expected_run_id (input build_run_id=$BUILD_RUN_ID)"
          fi

      - name: Update manifest and package.json on candidate branch
        if: steps.check_state.outputs.should_stage == 'true'
        env:
          BUILD_RUN_ID: ${{ inputs.build_run_id }}
          SOURCE_REF: ${{ steps.artifact.outputs.source_ref }}
          SOURCE_SHA: ${{ steps.artifact.outputs.source_sha }}
          VER: ${{ steps.artifact.outputs.ver }}
          BRANCH: ${{ steps.check_state.outputs.branch }}
        run: |
          set -eu
          git checkout -B "$BRANCH" "origin/$BRANCH"

          node - <<'NODE'
          const fs = require('fs');
          const manifestPath = 'config/codex-termux-release-manifest.json';
          const m = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
          m.build_run_id = String(process.env.BUILD_RUN_ID);
          m.source_ref = process.env.SOURCE_REF;
          m.source_sha = process.env.SOURCE_SHA;
          m.candidate_state_status = 'ready_to_publish';
          m.canonical_package_status = 'ready_to_publish';
          m.public_distribution_status = 'staged_for_publish';
          m.updated_at = new Date().toISOString();
          fs.writeFileSync(manifestPath, JSON.stringify(m, null, 2) + '\n');

          const pkgPath = 'packages/codex-termux/package.json';
          const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
          pkg.version = process.env.VER;
          fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');

          console.log('manifest updated: candidate ready_to_publish, package.json version set to', process.env.VER);
          NODE

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add config/codex-termux-release-manifest.json packages/codex-termux/package.json
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "stage: codex ${VER} ready_to_publish (build run ${BUILD_RUN_ID})"
          git push origin "HEAD:$BRANCH"
          echo "Pushed ready_to_publish state to $BRANCH"

      - name: Comment on candidate PR
        if: steps.check_state.outputs.should_stage == 'true'
        env:
          BRANCH: ${{ steps.check_state.outputs.branch }}
          VER: ${{ steps.artifact.outputs.ver }}
        run: |
          set -eu
          pr_number=$(gh pr list --repo bash0816/Codex-Termux --base main --head "$BRANCH" --json number --jq '.[0].number // empty')
          if [ -n "$pr_number" ]; then
            gh pr comment "$pr_number" --repo bash0816/Codex-Termux --body "Build for ${VER} succeeded. Manifest and package.json staged as ready_to_publish on \`${BRANCH}\`. Ready for human review: merge to main, then manually dispatch npm-package.yml (ref=main, publish=true, npm_tag=candidate) after npm-publish environment approval."
          else
            echo "No open PR found for $BRANCH, skipping comment"
          fi
