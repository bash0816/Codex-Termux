name: Codex Version Watch

on:
  schedule:
    - cron: '7 19 * * *'
  workflow_dispatch:

# Requires:
#   github.token - used for checkout, workflow dispatch, branch push, and PR creation
#   with the repository permissions granted below.

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  intake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          repository: bash0816/Codex-Termux
          ref: main
          fetch-depth: 0
          token: ${{ github.token }}

      - uses: actions/setup-node@v7
        with:
          node-version: '22'

      - name: Fetch upstream latest version
        id: latest
        run: |
          set -eu
          latest=$(npm view @openai/codex version)
          echo "version=$latest" >> "$GITHUB_OUTPUT"

      - name: Check current manifest state
        id: manifest
        run: |
          set -eu
          latest_audited=$(node -p "JSON.parse(require('fs').readFileSync('config/codex-termux-release-manifest.json','utf8')).latest_audited_version")
          latest_candidate=$(node -p "JSON.parse(require('fs').readFileSync('config/codex-termux-release-manifest.json','utf8')).latest_candidate_version || ''")
          candidate_state=$(node -p "JSON.parse(require('fs').readFileSync('config/codex-termux-release-manifest.json','utf8')).candidate_state_status || ''")
          {
            echo "latest_audited=$latest_audited"
            echo "latest_candidate=$latest_candidate"
            echo "candidate_state=$candidate_state"
          } >> "$GITHUB_OUTPUT"

      - name: Determine processing mode
        id: mode
        run: |
          set -eu
          latest="${{ steps.latest.outputs.version }}"
          latest_audited="${{ steps.manifest.outputs.latest_audited }}"
          latest_candidate="${{ steps.manifest.outputs.latest_candidate }}"
          candidate_state="${{ steps.manifest.outputs.candidate_state }}"
          if [ "$latest" = "$latest_audited" ]; then
            echo "mode=skip_uptodate" >> "$GITHUB_OUTPUT"
            echo "Already on latest audited: $latest"
          elif [ "$latest_candidate" = "$latest_audited" ]; then
            echo "mode=new_intake" >> "$GITHUB_OUTPUT"
            echo "New intake: $latest"
          elif [ "$latest_candidate" = "$latest" ] && [ "$candidate_state" = "v8_build_dispatched" ]; then
            echo "mode=v8_resume" >> "$GITHUB_OUTPUT"
            echo "Resuming v8_build_dispatched for: $latest"
          else
            echo "mode=skip_pending" >> "$GITHUB_OUTPUT"
            echo "Pending candidate exists: $latest_candidate state=$candidate_state"
          fi

      - name: Resolve v8 version from Cargo.lock
        id: v8_ver
        if: steps.mode.outputs.mode == 'new_intake' || steps.mode.outputs.mode == 'v8_resume'
        run: |
          set -eu
          version="${{ steps.latest.outputs.version }}"
          cargo_lock_url="https://raw.githubusercontent.com/openai/codex/rust-v${version}/codex-rs/Cargo.lock"
          v8_version=$(curl -fsSL "$cargo_lock_url" | awk '/^name = "v8"$/{found=1} found && /^version = /{gsub(/[" ]/, ""); sub("version=", ""); print; exit}')
          if [ -z "$v8_version" ]; then
            echo "ERROR: cannot resolve v8 version from Cargo.lock" >&2
            exit 1
          fi
          echo "v8_version=$v8_version" >> "$GITHUB_OUTPUT"
          echo "v8 version for codex ${version}: ${v8_version}"

      - name: Check v8 build asset
        id: v8_asset
        if: steps.mode.outputs.mode == 'new_intake' || steps.mode.outputs.mode == 'v8_resume'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          v8_version="${{ steps.v8_ver.outputs.v8_version }}"
          release_tag="rusty-v8-v${v8_version}"
          asset_name="librusty_v8_release_aarch64-linux-android.a.gz"
          if gh release view "$release_tag" --repo bash0816/Codex-Termux --json assets --jq ".assets[].name" 2>/dev/null | grep -qF "$asset_name"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "v8 asset exists: $release_tag/$asset_name"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "v8 asset not found: $release_tag/$asset_name"
          fi

      - name: Dispatch v8 build
        if: steps.mode.outputs.mode == 'new_intake' && steps.v8_asset.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          v8_version="${{ steps.v8_ver.outputs.v8_version }}"
          echo "Dispatching v8 build for version ${v8_version}..."
          gh workflow run build-rusty-v8-android.yml \
            --repo bash0816/Codex-Termux \
            -f v8_version="${v8_version}"
          echo "v8 build dispatched. Will proceed with codex build after v8 is ready."

      - name: Create automation branch and update manifest
        if: steps.mode.outputs.mode == 'new_intake' || (steps.mode.outputs.mode == 'v8_resume' && steps.v8_asset.outputs.exists == 'true')
        env:
          CANDIDATE_VERSION: ${{ steps.latest.outputs.version }}
          V8_ASSET_EXISTS: ${{ steps.v8_asset.outputs.exists }}
        run: |
          set -eu
          branch="automation/codex-${CANDIDATE_VERSION}"
          if [ "${V8_ASSET_EXISTS}" = "true" ]; then
            candidate_state="codex_build_dispatched"
          else
            candidate_state="v8_build_dispatched"
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$branch" origin/main
          node scripts/update-codex-candidate-manifest.js "$CANDIDATE_VERSION" "$candidate_state"
          git add config/codex-termux-release-manifest.json packages/codex-termux/config/codex-termux-release-manifest.json
          git commit -m "Track Codex ${CANDIDATE_VERSION} candidate"
          git push --force-with-lease origin "$branch"
          echo "branch=$branch" >> "$GITHUB_ENV"
      - name: Dispatch public external build
        if: (steps.mode.outputs.mode == 'new_intake' || steps.mode.outputs.mode == 'v8_resume') && steps.v8_asset.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          CANDIDATE_VERSION: ${{ steps.latest.outputs.version }}
        run: |
          set -eu
          [ -n "${GH_TOKEN:-}" ] || { echo "missing GITHUB_TOKEN" >&2; exit 1; }
          gh workflow run external-build-android-aarch64.yml \
            --repo bash0816/Codex-Termux \
            -f source_repository=openai/codex \
            -f source_ref="rust-v${CANDIDATE_VERSION}"

      - name: Create or reuse candidate PR
        if: steps.mode.outputs.mode == 'new_intake' || (steps.mode.outputs.mode == 'v8_resume' && steps.v8_asset.outputs.exists == 'true')
        env:
          GH_TOKEN: ${{ github.token }}
          CANDIDATE_VERSION: ${{ steps.latest.outputs.version }}
          V8_ASSET_EXISTS: ${{ steps.v8_asset.outputs.exists }}
        run: |
          set -eu
          if [ "${V8_ASSET_EXISTS}" = "true" ]; then
            candidate_state="codex_build_dispatched"
            build_status="public Android build dispatched"
          else
            candidate_state="v8_build_dispatched"
            build_status="v8 build dispatched"
          fi
          existing=$(gh pr list --repo bash0816/Codex-Termux --base main --head "$branch" --json number --jq 'length')
          if [ "$existing" -eq 0 ]; then
            gh pr create \
              --repo bash0816/Codex-Termux \
              --base main \
              --head "$branch" \
              --title "Track Codex ${CANDIDATE_VERSION} candidate" \
              --body "Automated upstream Codex intake.\n\n- upstream latest: ${CANDIDATE_VERSION}\n- ${build_status}\n- manifest candidate state: ${candidate_state}"
          else
            echo "candidate PR already exists for $branch"
          fi
