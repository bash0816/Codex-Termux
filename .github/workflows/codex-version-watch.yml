name: Codex Version Watch

on:
  schedule:
    - cron: '7 19 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  intake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: dev
          fetch-depth: 0

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: '22'

      - name: Fetch upstream latest version
        id: latest
        run: |
          set -eu
          latest=$(npm view @openai/codex version)
          echo "version=$latest" >> "$GITHUB_OUTPUT"

      - name: Check current manifest state
        id: manifest
        run: |
          set -eu
          latest_audited=$(node -p "JSON.parse(require('fs').readFileSync('config/codex-termux-release-manifest.json','utf8')).latest_audited_version")
          latest_candidate=$(node -p "JSON.parse(require('fs').readFileSync('config/codex-termux-release-manifest.json','utf8')).latest_candidate_version || ''")
          candidate_state=$(node -p "JSON.parse(require('fs').readFileSync('config/codex-termux-release-manifest.json','utf8')).candidate_state_status || ''")
          echo "latest_audited=$latest_audited" >> "$GITHUB_OUTPUT"
          echo "latest_candidate=$latest_candidate" >> "$GITHUB_OUTPUT"
          echo "candidate_state=$candidate_state" >> "$GITHUB_OUTPUT"

      - name: Stop when no newer version exists
        if: steps.latest.outputs.version == steps.manifest.outputs.latest_audited
        run: echo "already on latest upstream version"

      - name: Stop when pending candidate already exists
        if: steps.latest.outputs.version != steps.manifest.outputs.latest_audited && steps.manifest.outputs.latest_candidate != steps.manifest.outputs.latest_audited
        run: |
          echo "pending candidate exists: ${{ steps.manifest.outputs.latest_candidate }} state=${{ steps.manifest.outputs.candidate_state }}"
          exit 0

      - name: Check fork tag availability
        id: fork_tag
        if: steps.latest.outputs.version != steps.manifest.outputs.latest_audited && steps.manifest.outputs.latest_candidate == steps.manifest.outputs.latest_audited
        run: |
          set -eu
          if git ls-remote --exit-code --tags https://github.com/DioNanos/codex-termux.git "refs/tags/v${{ steps.latest.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop when fork tag is not ready yet
        if: steps.latest.outputs.version != steps.manifest.outputs.latest_audited && steps.manifest.outputs.latest_candidate == steps.manifest.outputs.latest_audited && steps.fork_tag.outputs.exists == 'false'
        run: |
          echo "upstream latest is ${{ steps.latest.outputs.version }}, but fork tag v${{ steps.latest.outputs.version }} is not available yet"

      - name: Create automation branch and update manifest
        if: steps.latest.outputs.version != steps.manifest.outputs.latest_audited && steps.manifest.outputs.latest_candidate == steps.manifest.outputs.latest_audited && steps.fork_tag.outputs.exists == 'true'
        env:
          CANDIDATE_VERSION: ${{ steps.latest.outputs.version }}
        run: |
          set -eu
          branch="automation/codex-${CANDIDATE_VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$branch" origin/dev
          node scripts/update-codex-candidate-manifest.js "$CANDIDATE_VERSION" build_dispatched
          git add config/codex-termux-release-manifest.json
          git commit -m "Track Codex ${CANDIDATE_VERSION} candidate"
          git push --force-with-lease origin "$branch"
          echo "branch=$branch" >> "$GITHUB_ENV"

      - name: Dispatch private external build
        if: steps.latest.outputs.version != steps.manifest.outputs.latest_audited && steps.manifest.outputs.latest_candidate == steps.manifest.outputs.latest_audited && steps.fork_tag.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.CODEX_PRIVATE_ARTIFACT_TOKEN }}
          CANDIDATE_VERSION: ${{ steps.latest.outputs.version }}
        run: |
          set -eu
          [ -n "${GH_TOKEN:-}" ] || { echo "missing CODEX_PRIVATE_ARTIFACT_TOKEN" >&2; exit 1; }
          gh workflow run external-build-android-aarch64.yml \
            --repo bash0816/private-repo \
            -f source_repository=DioNanos/codex-termux \
            -f source_ref="v${CANDIDATE_VERSION}"

      - name: Create or reuse candidate PR
        if: steps.latest.outputs.version != steps.manifest.outputs.latest_audited && steps.manifest.outputs.latest_candidate == steps.manifest.outputs.latest_audited && steps.fork_tag.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          CANDIDATE_VERSION: ${{ steps.latest.outputs.version }}
        run: |
          set -eu
          existing=$(gh pr list --base dev --head "$branch" --json number --jq 'length')
          if [ "$existing" -eq 0 ]; then
            gh pr create \
              --base dev \
              --head "$branch" \
              --title "Track Codex ${CANDIDATE_VERSION} candidate" \
              --body "Automated upstream Codex intake.\n\n- upstream latest: ${CANDIDATE_VERSION}\n- private Android build dispatched\n- manifest candidate state: build_dispatched"
          else
            echo "candidate PR already exists for $branch"
          fi
