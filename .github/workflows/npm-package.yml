name: npm package

on:
  pull_request:
    paths:
      - 'packages/codex-termux/**'
      - 'config/codex-termux-release-manifest.json'
      - 'README.md'
      - 'scripts/**'
      - '.github/workflows/npm-package.yml'
  push:
    branches:
      - dev
      - staging
      - main
    paths:
      - 'packages/codex-termux/**'
      - 'config/codex-termux-release-manifest.json'
      - 'README.md'
      - 'scripts/**'
      - '.github/workflows/npm-package.yml'
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish @bash0816/codex-termux to npm"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      npm_tag:
        description: "npm dist-tag to use when publishing"
        required: false
        default: "latest"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/codex-termux
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Syntax check
        run: |
          sh -n bin/codex
          sh -n bin/codex-exec
          sh -n bin/codex-termux
          sh -n lib/stage-android-runtime.sh
          sh -n ../../scripts/stage-public-android-runtime.sh
          node --check bin/codex.js
          node --check bin/codex-exec.js
          node --check lib/launcher.js
          node --check lib/check-updates.js
          node --check ../../scripts/prepare-public-release-from-candidate.js
          node --check ../../scripts/sync-public-release-from-manifest.js
          node --check ../../scripts/check-public-release-skeleton.js
          node --check ../../scripts/check-public-publish-guard.js

      - name: Manifest / README drift check
        run: node ../../scripts/check-public-release-skeleton.js

      - name: Pack dry run
        run: npm pack --dry-run

  publish:
    if: github.event_name == 'workflow_dispatch' && inputs.publish == 'true'
    needs: verify
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: packages/codex-termux
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish guard
        run: node ../../scripts/check-public-publish-guard.js

      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TAG: ${{ inputs.npm_tag || 'latest' }}
        run: |
          set -euo pipefail
          npm publish --access public --tag "${NPM_TAG}"
