name: npm package

on:
  pull_request:
    paths:
      - 'packages/codex-termux/**'
      - 'config/codex-termux-release-manifest.json'
      - 'README.md'
      - 'scripts/**'
      - '.github/workflows/npm-package.yml'
  push:
    branches:
      - dev
      - staging
      - main
    paths:
      - 'packages/codex-termux/**'
      - 'config/codex-termux-release-manifest.json'
      - 'README.md'
      - 'scripts/**'
      - '.github/workflows/npm-package.yml'
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish @bash0816/codex-termux to npm"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      npm_tag:
        description: "npm dist-tag to use when publishing"
        required: false
        default: "latest"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/codex-termux
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Syntax check
        run: |
          sh -n bin/codex
          sh -n bin/codex-exec
          sh -n bin/codex-termux
          sh -n lib/stage-android-runtime.sh
          sh -n ../../scripts/stage-public-android-runtime.sh
          node --check bin/codex.js
          node --check bin/codex-exec.js
          node --check lib/launcher.js
          node --check lib/check-updates.js
          node --check ../../scripts/prepare-public-release-from-candidate.js
          node --check ../../scripts/sync-public-release-from-manifest.js
          node --check ../../scripts/check-public-release-skeleton.js
          node --check ../../scripts/check-public-publish-guard.js

      - name: Manifest / README drift check
        run: node ../../scripts/check-public-release-skeleton.js

      - name: Pack dry run
        run: npm pack --dry-run

      - name: Tarball content check
        run: |
          set -euo pipefail
          node -e "
            const { execSync } = require('child_process');
            const raw = execSync('npm pack --json --dry-run', { encoding: 'utf8' });
            const d = JSON.parse(raw);
            const pack = Array.isArray(d) ? d[0] : d;
            const files = (pack.files||[]).map(f => String(f.path||'').replace(/^\.\//,''));
            console.log('Packed files:', files.join(', '));

            const pkg = JSON.parse(require('fs').readFileSync('package.json','utf8'));
            const scripts = pkg.scripts || {};
            const forbidden = ['preinstall','install','postinstall','prepare'];
            const found = forbidden.filter(k => scripts[k]);
            if (found.length) throw new Error('forbidden lifecycle scripts: ' + found.join(', '));

            const unexpected = files.filter(f => {
              if (f === 'package.json' || f === 'README.md') return false;
              if (f === 'LICENSE' || f === 'THIRD-PARTY-NOTICES.md') return false;
              if (f.startsWith('bin/') || f.startsWith('lib/') || f.startsWith('config/')) return false;
              if (f.startsWith('THIRD-PARTY-LICENSES/')) return false;
              return true;
            });
            if (unexpected.length) throw new Error('unexpected files in tarball: ' + unexpected.join(', '));
            console.log('tarball content check passed');
          "

  preflight:
    if: github.event_name == 'workflow_dispatch' && inputs.publish == 'true'
    needs: verify
    runs-on: ubuntu-latest
    # github.token has read access to environments for public repos (GitHub Actions GITHUB_TOKEN spec)
    steps:
      - name: Verify npm-publish environment has required reviewers
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          reviewers=$(gh api repos/${{ github.repository }}/environments/npm-publish \
            --jq '(.protection_rules // []) | map(select(.type=="required_reviewers")) | length')
          if [ "$reviewers" -eq 0 ]; then
            echo "::error::npm-publish environment has no required reviewers configured. Set up reviewer at: Settings > Environments > npm-publish"
            exit 1
          fi
          echo "npm-publish environment reviewer check passed (count: ${reviewers})"

  publish:
    needs: [verify, preflight]
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
      attestations: write
    defaults:
      run:
        working-directory: packages/codex-termux
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Stage runtime binaries from build artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          MANIFEST=$(cat ../../config/codex-termux-release-manifest.json)
          BUILD_RUN_ID=$(node -p "JSON.parse(process.argv[1]).build_run_id" "$MANIFEST")
          SOURCE_REF=$(node -p "JSON.parse(process.argv[1]).source_ref" "$MANIFEST")
          echo "Staging from build run: ${BUILD_RUN_ID} (${SOURCE_REF})"
          gh run download "${BUILD_RUN_ID}" \
            --repo bash0816/Codex-Termux \
            --name "codex-external-android-aarch64-${BUILD_RUN_ID}" \
            --dir /tmp/codex-artifact
          SOURCE_SHA=$(node -p "JSON.parse(require('fs').readFileSync('/tmp/codex-artifact/manifest.json','utf8')).source.sha")
          MANIFEST_REF=$(node -p "JSON.parse(require('fs').readFileSync('/tmp/codex-artifact/manifest.json','utf8')).source.ref")
          if [ "$MANIFEST_REF" != "$SOURCE_REF" ]; then
            echo "ERROR: artifact source.ref ($MANIFEST_REF) does not match manifest source_ref ($SOURCE_REF)" >&2
            exit 1
          fi
          bash ../../scripts/stage-public-android-runtime.sh \
            --artifact-dir /tmp/codex-artifact \
            --source-repository openai/codex \
            --source-ref "${SOURCE_REF}" \
            --source-sha "${SOURCE_SHA}"
          echo "Staging complete"

      - name: Publish guard
        run: node ../../scripts/check-public-publish-guard.js

      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TAG: ${{ inputs.npm_tag || 'latest' }}
        run: |
          set -euo pipefail
          npm publish --provenance --access public --tag "${NPM_TAG}"
