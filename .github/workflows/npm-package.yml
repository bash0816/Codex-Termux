name: npm package

on:
  pull_request:
    paths:
      - 'packages/codex-termux/**'
      - 'config/codex-termux-release-manifest.json'
      - 'docs/20260503_codex-termux-release-guidance.md'
      - 'README.md'
      - 'scripts/**'
      - '.github/workflows/npm-package.yml'
  push:
    branches:
      - dev
      - staging
      - main
    paths:
      - 'packages/codex-termux/**'
      - 'config/codex-termux-release-manifest.json'
      - 'docs/20260503_codex-termux-release-guidance.md'
      - 'README.md'
      - 'scripts/**'
      - '.github/workflows/npm-package.yml'
  workflow_dispatch:
    inputs:
      prepare_note:
        description: 'Verification-only skeleton workflow while public support remains withheld'
        required: false
        default: 'verify-only'
      publish:
        description: 'Attempt guarded publish flow'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      publish_mode:
        description: 'Publish mode: direct publishes immediately, stage requires later 2FA approval'
        required: false
        default: 'direct'
        type: choice
        options:
          - 'direct'
          - 'stage'
      npm_tag:
        description: 'npm dist-tag to use when publishing'
        required: false
        default: 'latest'
      artifact_run_id:
        description: 'private-repo workflow run id that produced the verified artifact'
        required: false
        default: ''
      artifact_name:
        description: 'Artifact bundle name from the private workflow run'
        required: false
        default: ''
      source_repository:
        description: 'Expected source repository recorded in manifest.json'
        required: false
        default: 'DioNanos/codex-termux'
      source_ref:
        description: 'Expected source ref recorded in manifest.json'
        required: false
        default: ''
      source_sha:
        description: 'Expected source sha recorded in manifest.json'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: '22'

      - name: Syntax check
        run: |
          sh -n packages/codex-termux/bin/codex
          sh -n packages/codex-termux/bin/codex-exec
          sh -n packages/codex-termux/bin/codex-termux
          sh -n packages/codex-termux/lib/stage-android-runtime.sh
          sh -n scripts/stage-public-android-runtime.sh
          node --check packages/codex-termux/bin/codex.js
          node --check packages/codex-termux/bin/codex-exec.js
          node --check packages/codex-termux/lib/launcher.js
          node --check scripts/prepare-public-release-from-candidate.js
          node --check scripts/sync-public-release-from-manifest.js
          node --check scripts/check-public-release-skeleton.js
          node --check scripts/check-public-publish-guard.js

      - name: Manifest / README drift check
        run: node scripts/check-public-release-skeleton.js

      - name: npm pack dry run
        working-directory: packages/codex-termux
        run: npm pack --dry-run

  publish-guard:
    needs: verify
    if: github.event_name == 'workflow_dispatch' && inputs.publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: '22'

      - name: Check publish guard
        run: node scripts/check-public-publish-guard.js --skip-runtime-files

  publish-package:
    needs: publish-guard
    if: github.event_name == 'workflow_dispatch' && inputs.publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Validate publish inputs
        run: |
          set -eu
          [ "${GITHUB_REF_NAME}" = "main" ] || { echo "publish is only allowed from main" >&2; exit 1; }
          [ -n "${{ inputs.artifact_run_id }}" ] || { echo "missing artifact_run_id" >&2; exit 1; }
          [ -n "${{ inputs.artifact_name }}" ] || { echo "missing artifact_name" >&2; exit 1; }
          [ -n "${{ inputs.source_repository }}" ] || { echo "missing source_repository" >&2; exit 1; }
          [ -n "${{ inputs.source_ref }}" ] || { echo "missing source_ref" >&2; exit 1; }
          [ -n "${{ inputs.source_sha }}" ] || { echo "missing source_sha" >&2; exit 1; }

      - name: Download verified private artifact
        env:
          GH_TOKEN: ${{ secrets.CODEX_PRIVATE_ARTIFACT_TOKEN }}
        run: |
          set -eu
          [ -n "${GH_TOKEN:-}" ] || { echo "missing CODEX_PRIVATE_ARTIFACT_TOKEN" >&2; exit 1; }
          mkdir -p "$RUNNER_TEMP/private-artifact"
          gh run download "${{ inputs.artifact_run_id }}" \
            --repo bash0816/private-repo \
            --name "${{ inputs.artifact_name }}" \
            --dir "$RUNNER_TEMP/private-artifact"

      - name: Stage verified Android runtime
        run: |
          set -eu
          sh scripts/stage-public-android-runtime.sh \
            --artifact-dir "$RUNNER_TEMP/private-artifact" \
            --source-repository "${{ inputs.source_repository }}" \
            --source-ref "${{ inputs.source_ref }}" \
            --source-sha "${{ inputs.source_sha }}"

      - name: Check publish guard
        run: node scripts/check-public-publish-guard.js

      - name: npm pack dry run before publish
        working-directory: packages/codex-termux
        run: npm pack --dry-run

      - name: Re-check publish guard before npm publish
        run: node scripts/check-public-publish-guard.js

      - name: Verify npm staged publishing support
        env:
          PUBLISH_MODE: ${{ inputs.publish_mode || 'direct' }}
        run: |
          set -eu
          node_version="$(node -v | sed 's/^v//')"
          npm_version="$(npm -v)"
          echo "node=${node_version}"
          echo "npm=${npm_version}"
          if [ "${PUBLISH_MODE}" = "stage" ]; then
            if [ "$(printf '%s\n' "22.14.0" "${node_version}" | sort -V | head -n1)" != "22.14.0" ]; then
              echo "staged publishing requires node >= 22.14.0; got ${node_version}" >&2
              exit 1
            fi
            if [ "$(printf '%s\n' "11.15.0" "${npm_version}" | sort -V | head -n1)" != "11.15.0" ]; then
              echo "staged publishing requires npm >= 11.15.0; got ${npm_version}" >&2
              exit 1
            fi
            npm stage --help >/dev/null
          fi

      - name: Publish or stage package
        working-directory: packages/codex-termux
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PUBLISH_MODE: ${{ inputs.publish_mode || 'direct' }}
          NPM_TAG: ${{ inputs.npm_tag }}
        run: |
          set -eu
          [ -n "${NODE_AUTH_TOKEN:-}" ] || { echo "missing NPM_TOKEN" >&2; exit 1; }
          if [ "${PUBLISH_MODE}" = "stage" ]; then
            npm stage publish --tag "${NPM_TAG}"
            npm stage list @bash0816/codex-termux || true
          else
            npm publish --access public --tag "${NPM_TAG}"
          fi

      - name: Verify registry publication
        if: ${{ inputs.publish_mode != 'stage' }}
        run: |
          set -eu
          EXPECTED_VERSION=$(node -p "JSON.parse(require('fs').readFileSync('packages/codex-termux/package.json','utf8')).version")
          EXPECTED_TAG="${{ inputs.npm_tag }}"
          tries=0
          max_tries=6
          while :; do
            tries=$((tries + 1))
            versions=$(npm view @bash0816/codex-termux versions --json 2>/dev/null || true)
            tag=$(npm view @bash0816/codex-termux dist-tags."${EXPECTED_TAG}" 2>/dev/null || true)
            if printf '%s' "$versions" | grep -q "\"$EXPECTED_VERSION\"" && [ "$tag" = "$EXPECTED_VERSION" ]; then
              break
            fi
            if [ "$tries" -ge "$max_tries" ]; then
              echo "registry verification failed: versions=$versions tag=$tag expected=$EXPECTED_VERSION" >&2
              exit 1
            fi
            sleep 10
          done

      - name: Verify published package file shape
        if: ${{ inputs.publish_mode != 'stage' }}
        run: |
          set -eu
          EXPECTED_VERSION=$(node -p "JSON.parse(require('fs').readFileSync('packages/codex-termux/package.json','utf8')).version")
          temp_dir=$(mktemp -d)
          trap 'rm -rf "$temp_dir"' EXIT INT TERM
          npm pack @bash0816/codex-termux@"$EXPECTED_VERSION" --pack-destination "$temp_dir" >/dev/null
          tar -tf "$temp_dir"/bash0816-codex-termux-"$EXPECTED_VERSION".tgz | grep -q 'package/bin/codex.bin'
          tar -tf "$temp_dir"/bash0816-codex-termux-"$EXPECTED_VERSION".tgz | grep -q 'package/bin/codex-exec.bin'
          tar -tf "$temp_dir"/bash0816-codex-termux-"$EXPECTED_VERSION".tgz | grep -q 'package/bin/libc++_shared.so'

      - name: Emit staged publish follow-up
        if: ${{ inputs.publish_mode == 'stage' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -eu
          echo "Package was staged, not published live."
          echo "Approve it with 2FA from npmjs.com Staged Packages or via npm stage approve <stage-id>."
          npm stage list @bash0816/codex-termux || true
